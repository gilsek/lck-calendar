name: Update LoL Esports Calendar

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: mkdir -p public previous
      - run: curl -fsSL https://gilsek.github.io/lck-calendar/lolesports-lck.ics -o previous/lolesports-lck.ics || true
      - run: curl -fsSL https://gilsek.github.io/lck-calendar/lolesports-t1-lck.ics -o previous/lolesports-t1-lck.ics || true
      - run: curl -fsSL https://gilsek.github.io/lck-calendar/ewc-lol.ics -o previous/ewc-lol.ics || true
      - run: >
          python fetch-lolesports-calendar.py
          --url "https://lolesports.com/ko-KR/leagues/lck,https://lolesports.com/ko-KR/leagues/msi,https://lolesports.com/ko-KR/leagues/worlds,https://lolesports.com/ko-KR/leagues/first_stand"
          --output public/lolesports-lck.ics
          --merge-existing-ics previous/lolesports-lck.ics
      - run: >
          python fetch-lolesports-calendar.py
          --url "https://lolesports.com/ko-KR/leagues/lck,https://lolesports.com/ko-KR/leagues/msi,https://lolesports.com/ko-KR/leagues/worlds,https://lolesports.com/ko-KR/leagues/first_stand"
          --output public/lolesports-t1-lck.ics
          --leagues lck,msi,worlds,first_stand
          --teams T1
          --team-filter-leagues lck
          --calendar-name "LoL Esports - T1 LCK + Internationals"
          --merge-existing-ics previous/lolesports-t1-lck.ics
      - run: >
          python fetch-ewc-lol-calendar.py
          --url "https://esportsworldcup.com/en/competitions/2026/league-of-legends"
          --output public/ewc-lol.ics
          --calendar-name "EWC LoL"
          --merge-existing-ics previous/ewc-lol.ics
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
